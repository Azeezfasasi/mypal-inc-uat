name: CI, Deploy with Rollback

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
        - deploy
        - rollback

jobs:
  deploy:
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build application
        run: npm run build
        env:
          VITE_API_BASE_URL: https://api.mypal-inc.com/v1
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Prepare Deployment Package
        run: |
          mkdir -p deploy-package
          cp -r dist/* deploy-package/
          if [ -d "public" ]; then cp -r public/* deploy-package/ 2>/dev/null || true; fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via Rsync
        run: |
          # Use the commit hash for a unique folder name
          REL_DIR="deploy_${{ github.sha }}"
          
          # Create the release folder first
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no deployer@${{ secrets.SERVER_HOST }} "mkdir -p /var/www/mypal/frontend/mypalsite/${REL_DIR}"

          # Sync files directly to that folder
          rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" \
            deploy-package/ \
            deployer@${{ secrets.SERVER_HOST }}:/var/www/mypal/frontend/mypalsite/${REL_DIR}/

      - name: Finalize on Server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: deployer
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            set -e
            BASE_PATH="/var/www/mypal/frontend/mypalsite"
            NEW_REL="${BASE_PATH}/deploy_${{ github.sha }}"
            
            # Atomic Switch: point 'current' to the new version
            ln -sfn ${NEW_REL} ${BASE_PATH}/current
            
            # Cleanup: Keep last 3 deployments
            cd ${BASE_PATH} && ls -dt deploy_* | tail -n +4 | xargs -r rm -rf || true
            
            # Use the sudo right we gave deployer to reload Nginx
            sudo systemctl reload nginx
            echo "🎉 MyPal Site is Live!"
